<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chunkyyy...</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0c;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 40px 20px;
            z-index: 3;
            background: rgba(18, 18, 24, 0.6);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 40px;
            color: #ff4081;
            text-shadow: 0 0 20px rgba(255, 64, 129, 0.6);
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .btn-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            height: 100px; /* Gives space for button movement */
            width: 100%;
        }

        button {
            padding: 16px 45px;
            font-size: 1.3rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        .btn-yes {
            background-color: #00e676;
            color: #000;
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.5);
            animation: pulse 1.5s infinite alternate;
        }

        .btn-yes:hover {
            transform: scale(1.15);
            box-shadow: 0 0 35px rgba(0, 230, 118, 0.8);
        }

        /* The trick button uses fixed positioning to teleport anywhere safely */
        .btn-no {
            background-color: #ff1744;
            color: white;
            box-shadow: 0 0 25px rgba(255, 23, 68, 0.4);
            position: relative;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); }
            100% { transform: scale(1.06); box-shadow: 0 0 35px rgba(0, 230, 118, 0.7); }
        }

        .page {
            display: none;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Full-screen Background Media Layer */
        .background-media {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
            display: none;
        }

        /* Full-screen Fireworks Layer */
        .fireworks-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            display: none;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- YES PAGE BACKGROUND VIDEO -->
    <video id="intense-bg" class="background-media" loop muted playsinline>
        <source src="intense.mp4" type="video/mp4">
    </video>
    
    <!-- Transparent Fireworks Overlay -->
    <img id="fireworks" class="fireworks-overlay" src="https://media.giphy.com/media/26tOZ42Mg6pbT196g/giphy.gif" alt="Fireworks">

    <!-- HOMEPAGE -->
    <div id="homepage" class="container">
        <h1>Chunkyyy...<br>Will i see you?</h1>
        <div class="btn-container">
            <button class="btn-yes" onclick="showYesPage()">Yes</button>
            <button id="no-button" class="btn-no" onmouseover="teleportNoButton()" onclick="teleportNoButton()">No</button>
        </div>
    </div>

    <!-- YES PAGE -->
    <div id="yes-page" class="container page">
        <h1 style="color: #fff; text-shadow: 0 0 25px #ff4081; font-size: 3.5rem;">Hell Yeah! 🔥</h1>
    </div>

    <script>
        // 1. IMPOSSIBLE NO BUTTON LOGIC
        function teleportNoButton() {
            const noBtn = document.getElementById('no-button');
            
            // Switch positioning to fixed so it can hop anywhere on the screen layout
            noBtn.style.position = 'fixed';
            
            // Generate coordinates leaving a 100px safety margin away from extreme screen edges
            const newX = Math.random() * (window.innerWidth - 150) + 50;
            const newY = Math.random() * (window.innerHeight - 80) + 40;
            
            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;
        }

        // 2. YES PAGE ACTION WITH WHATSAPP REDIRECT
        function showYesPage() {
            document.getElementById('homepage').style.display = 'none';
            document.getElementById('yes-page').style.display = 'block';
            
            // Activate and play background media loops
            const bgVideo = document.getElementById('intense-bg');
            bgVideo.style.display = 'block';
            bgVideo.play();
            
            document.getElementById('fireworks').style.display = 'block';

            // Trigger the native popup, then fire up WhatsApp when he clicks 'OK'
            setTimeout(() => {
                alert("its about to go down");
                
                // --- CUSTOMIZE WHATSAPP DETAILS HERE ---
                const phoneNumber = "1234567890"; // Put your phone number here (include country code, no "+" or spaces)
                const preFilledText = "Okay, I clicked Yes! It's about to go down. 🙈🔥"; 
                
                // Form link and route the browser
                const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(preFilledText)}`;
                window.location.href = whatsappUrl;
            }, 500);
        }
    </script>
</body>
</html>
